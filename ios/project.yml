name: PharosMobile
options:
  bundleIdPrefix: me.pai
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: TN7ZDD72P2
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "128"
packages:
  PharosShared:
    path: ..
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: 0.12.1
  SwiftNIOSSH:
    url: https://github.com/Wellz26/swift-nio-ssh.git
    from: 0.3.6
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.14.0
targets:
  PharosMobile:
    type: application
    platform: iOS
    sources:
      - path: PharosMobile
    dependencies:
      - package: PharosShared
        product: PharosMeshProtocol
      - package: MarkdownUI
        product: MarkdownUI
      - package: Citadel
        product: Citadel
      - package: SwiftNIOSSH
        product: NIOSSH
      - package: SwiftTerm
        product: SwiftTerm
    info:
      path: PharosMobile/Info.plist
      properties:
        CFBundleDisplayName: Pharos
        # Reference the build settings so version lives in one place (settings
        # → MARKETING_VERSION / CURRENT_PROJECT_VERSION). Without these keys,
        # xcodegen 2.45.x hardcodes CFBundleShortVersionString to "1.0" instead.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "© 2026 Pai"
        LSApplicationCategoryType: public.app-category.developer-tools
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Pharos uses the camera to scan Broker pairing codes and attach photos to Mesh messages."
        CFBundleURLTypes:
          - CFBundleURLName: me.pai.pharos.mobile.pairing
            CFBundleURLSchemes:
              - pharos
        NSLocalNetworkUsageDescription: "Pharos connects to your private Mesh broker and SSH hosts over Tailscale."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: PharosMobile/PharosMobile.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)me.pai.pharos.mobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.pai.pharos.mobile
        PRODUCT_NAME: PharosMobile
        PRODUCT_MODULE_NAME: PharosMobile
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: PharosMobile/PharosMobile.entitlements
      configs:
        # Archive (Release) must sign with the match distribution profile — the
        # Automatic wildcard team profile can't carry the iCloud entitlement.
        # Scoped to this target: SwiftPM package targets reject profiles, so
        # this can never go through global xcargs. Debug stays Automatic for
        # device_install.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: match AppStore me.pai.pharos.mobile
  PharosMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PharosMobileTests
    dependencies:
      - target: PharosMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.pai.pharos.mobile.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PharosMobile:
    build:
      targets:
        PharosMobile: all
        PharosMobileTests: [test]
    test:
      targets:
        - PharosMobileTests
