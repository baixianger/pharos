<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F3EB"/>
      <stop offset="0.45" stop-color="#DEEBF7"/>
      <stop offset="1" stop-color="#A8CBE8"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6EA7D6"/>
      <stop offset="1" stop-color="#4C84BB"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F3F6F9"/>
      <stop offset="1" stop-color="#D6DEE7"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0" stop-color="#FFF6CF"/>
      <stop offset="0.55" stop-color="#FFD976"/>
      <stop offset="1" stop-color="#F0B23E"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF7DC" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFF7DC" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="towerClip">
      <path d="M392 760 L632 760 L580 366 L444 366 Z"/>
    </clipPath>
    <clipPath id="card">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#sky)"/>

    <!-- stars -->
    <g fill="#FFFFFF">
      <path d="M250 248 l9 26 26 9 -26 9 -9 26 -9 -26 -26 -9 26 -9 z" opacity="0.9"/>
      <path d="M792 196 l7 20 20 7 -20 7 -7 20 -7 -20 -20 -7 20 -7 z" opacity="0.8"/>
      <circle cx="172" cy="432" r="5" opacity="0.75"/>
      <circle cx="852" cy="356" r="6" opacity="0.8"/>
    </g>

    <!-- light beams -->
    <g>
      <path d="M512 300 L116 150 L52 472 Z" fill="url(#beam)"/>
      <path d="M512 300 L908 150 L972 472 Z" fill="url(#beam)"/>
    </g>

    <!-- sea -->
    <path d="M0 752 Q256 714 512 752 T1024 752 L1024 1024 L0 1024 Z" fill="url(#sea)"/>
    <path d="M0 788 Q280 754 560 788 T1024 780" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="10" stroke-linecap="round"/>

    <!-- rock -->
    <ellipse cx="512" cy="792" rx="208" ry="68" fill="#3E5163"/>
    <path d="M320 786 Q400 752 512 760 Q624 752 704 786 Q620 800 512 800 Q404 800 320 786 Z" fill="#FFFFFF" opacity="0.08"/>

    <!-- tower -->
    <path d="M392 760 L632 760 L580 366 L444 366 Z" fill="url(#tower)"/>
    <g clip-path="url(#towerClip)">
      <rect x="376" y="690" width="272" height="46" fill="#E6705B"/>
      <rect x="384" y="566" width="256" height="44" fill="#E6705B"/>
      <rect x="394" y="446" width="236" height="42" fill="#E6705B"/>
    </g>
    <path d="M512 760 L632 760 L580 366 L512 366 Z" fill="#10243A" opacity="0.06"/>

    <!-- gallery -->
    <rect x="428" y="348" width="168" height="26" rx="8" fill="#36506C"/>
    <rect x="422" y="372" width="180" height="8" rx="4" fill="#2C3F54" opacity="0.45"/>

    <!-- lantern -->
    <rect x="452" y="262" width="120" height="92" rx="11" fill="#2C3F54"/>
    <rect x="466" y="276" width="92" height="66" rx="6" fill="url(#lamp)"/>
    <line x1="512" y1="276" x2="512" y2="342" stroke="#2C3F54" stroke-width="7"/>

    <!-- roof + finial -->
    <path d="M440 262 Q512 192 584 262 Z" fill="#36506C"/>
    <circle cx="512" cy="196" r="12" fill="#36506C"/>
    <circle cx="512" cy="174" r="7" fill="#FFD976"/>
  </g>
</svg>
